# Documentation: https://github.com/lowlighter/metrics/blob/master/README.md#-documentation
name: Metrics
on:
  schedule: [{cron: "0 0 * * *"}]
  workflow_dispatch:
  push: {branches: ["master"]}
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  metrics-left:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: production
    permissions:
      contents: write
    steps:
      - name: Left side
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          committer_token: ${{ secrets.GITHUB_TOKEN }}
          filename: metrics_left.svg
          committer_message: "Update metrics_left.svg - [Skip GitHub Action]"
          base: header, activity, community, repositories, metadata
          plugin_gists: yes
          plugin_lines: yes
          plugin_traffic: yes
          plugin_languages: yes
          plugin_languages_details: bytes-size, percentage
          retries: 3
          retries_delay: 300

  metrics-right:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: production
    permissions:
      contents: write
    steps:
      - name: Right side
        uses: lowlighter/metrics@latest
        with:
          filename: metrics_right.svg
          token: ${{ secrets.METRICS_TOKEN }}
          committer_token: ${{ secrets.GITHUB_TOKEN }}
          committer_message: "Update metrics_right.svg - [Skip GitHub Action]"
          base: ""
          plugin_wakatime: yes
          plugin_wakatime_days: 365
          plugin_wakatime_sections: time, projects, os
          plugin_wakatime_token: ${{ secrets.WAKATIME_TOKEN }}
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          plugin_stars: yes
          plugin_stars_limit: 4
          retries: 3
          retries_delay: 300
